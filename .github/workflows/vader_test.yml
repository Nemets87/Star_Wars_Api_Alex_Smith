name: Vader Friends Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Загрузить код
        uses: actions/checkout@v4

      - name: 🐍 Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Установить зависимости Python
        run: |
          python -m pip install --upgrade pip
          pip install requests allure-pytest pytest

      - name: 🧪 Запустить тест с Allure-результатами
        run: |
          pytest test_vader.py --alluredir=./allure-results -v

      - name: ☕ Установить Java (нужна для Allure CLI)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: ⬇️ Скачать и установить Allure CLI
        run: |
          ALLURE_VERSION=2.32.0   # актуальная версия, можно проверить https://github.com/allure-framework/allure2/releases
          wget https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
          tar -xzf allure-${ALLURE_VERSION}.tgz
          sudo mv allure-${ALLURE_VERSION} /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: 🌟 Сгенерировать Allure-отчёт
        run: |
          allure generate ./allure-results -o ./allure-report --clean

      - name: 📊 Сохранить Allure-результаты (артефакт)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: 📁 Сохранить сгенерированный отчёт (артефакт)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: 📁 Сохранить файл с именами
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vader-friends
          path: vader_friends.txt

      - name: 📝 Сохранить лог
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mission-log
          path: vader_mission.log

      - name: 📤 Опубликовать отчёт на GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
